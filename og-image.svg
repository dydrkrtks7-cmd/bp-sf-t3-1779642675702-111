<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="175" cy="149" r="36" fill="#e91e63" opacity="0.18"/>
    <circle cx="-81" cy="12" r="63" fill="#e91e63" opacity="0.17"/>
    <circle cx="955" cy="383" r="98" fill="#e91e63" opacity="0.13"/>
    <circle cx="274" cy="-39" r="25" fill="#e91e63" opacity="0.13"/>
    <circle cx="113" cy="379" r="43" fill="#e91e63" opacity="0.06"/>
    <circle cx="183" cy="475" r="94" fill="#e91e63" opacity="0.17"/>
    <rect x="821" y="199" width="77" height="43" rx="8" fill="#c2185b" opacity="0.14" transform="rotate(8, 584, 370)"/>
    <rect x="-43" y="117" width="59" height="78" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(2, 763, 337)"/>
    <rect x="1166" y="508" width="27" height="77" rx="8" fill="#c2185b" opacity="0.09" transform="rotate(3, 824, 36)"/>
    <rect x="1066" y="163" width="36" height="98" rx="8" fill="#c2185b" opacity="0.14" transform="rotate(42, 202, 55)"/>
    <rect x="486" y="320" width="23" height="23" rx="8" fill="#c2185b" opacity="0.04" transform="rotate(17, 735, 604)"/>
    <rect x="808" y="704" width="85" height="88" rx="8" fill="#c2185b" opacity="0.09" transform="rotate(0, 45, 331)"/>
    <rect x="254" y="690" width="75" height="27" rx="8" fill="#c2185b" opacity="0.05" transform="rotate(3, 585, 501)"/>
    <rect x="576" y="377" width="86" height="66" rx="8" fill="#c2185b" opacity="0.04" transform="rotate(18, 850, 713)"/>
    <polygon points="1170,74 1238,210 1102,210" fill="#e91e63" opacity="0.04"/>
    <polygon points="1132,-92 1209,62 1055,62" fill="#e91e63" opacity="0.08"/>
    <polygon points="881,78 903,122 859,122" fill="#e91e63" opacity="0.09"/>
    <polygon points="553,148 603,248 503,248" fill="#e91e63" opacity="0.03"/>

  <!-- Wave at bottom -->
  <path d="M0,590 C360,610 840,570 1200,590 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    PBN 빌더
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 PBN 빌더 — 서버 웜업
  </text>
</svg>